<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-84VX6Y86CF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-84VX6Y86CF');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak Study AI — Your Personal Tutor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f111a;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f111a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
        .gradient-text {
            background: linear-gradient(135deg, #a7f3d0 0%, #34d399 50%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="text-slate-100 flex h-screen overflow-hidden">

    <!-- Side Navigation -->
    <aside class="w-80 bg-[#161925] border-r border-slate-800/80 p-5 flex flex-col justify-between h-full">
        <div class="space-y-6">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-tr from-emerald-400 to-emerald-600 p-2 rounded-xl shadow-lg shadow-emerald-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-slate-900">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
                    </svg>
                </div>
                <span class="text-xl font-bold tracking-tight gradient-text">Pak Study AI</span>
            </div>

            <button onclick="clearChat()" class="w-full bg-slate-800/50 hover:bg-red-950/30 hover:text-red-400 text-slate-300 border border-slate-700/50 py-2.5 px-4 rounded-xl font-medium transition duration-200 flex items-center justify-center space-x-2 text-sm">
                <span>🗑️ Delete Chat History</span>
            </button>

            <nav class="space-y-1.5">
                <a href="#chat" class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-slate-800 text-emerald-400 font-medium text-sm transition">
                    <span>💬</span> <span>Study Assistant</span>
                </a>
            </nav>
        </div>

        <!-- Google Auth -->
        <div id="auth-section" class="border-t border-slate-800/80 pt-4">
            <button id="login-btn" onclick="googleLogin()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 py-3 rounded-xl font-semibold transition duration-200 flex items-center justify-center space-x-2 shadow-lg shadow-emerald-500/10 text-sm">
                <span>⚡ Google Sign In</span>
            </button>
            <div id="user-profile" class="hidden flex items-center justify-between p-2.5 bg-slate-800/30 rounded-xl border border-slate-800">
                <div class="flex items-center space-x-3">
                    <img id="user-avatar" src="" class="w-9 h-9 rounded-full ring-2 ring-emerald-500/30">
                    <div class="flex flex-col">
                        <span id="user-name" class="text-xs font-semibold text-slate-200 truncate max-w-[120px]"></span>
                        <span class="text-[10px] text-emerald-400 font-medium">Logged In</span>
                    </div>
                </div>
                <button onclick="googleLogout()" class="text-xs text-slate-400 hover:text-red-400 transition font-medium">Logout</button>
            </div>
        </div>
    </aside>

    <!-- Chat Area -->
    <main class="flex-1 flex flex-col bg-[#0f111a] relative h-full">
        <header class="h-16 border-b border-slate-900/50 flex items-center justify-between px-8 bg-[#0f111a]/80 backdrop-blur-md z-10">
            <div class="flex items-center space-x-2">
                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                <span class="text-xs font-semibold tracking-wider text-slate-400 uppercase">Live Academic Engine</span>
            </div>
            <button onclick="generatePDF()" class="bg-slate-800 hover:bg-emerald-500 hover:text-slate-950 text-slate-300 px-4 py-1.5 rounded-lg text-xs font-medium border border-slate-700/50 transition duration-200 flex items-center space-x-1.5">
                <span>📄 Export as PDF</span>
            </button>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto px-12 py-8 space-y-6 flex flex-col"></div>

        <!-- Chat Input Section -->
        <div class="px-12 pb-8 pt-4 bg-[#0f111a]">
            <!-- Image Preview Box (If image selected) -->
            <div id="image-preview-container" class="hidden max-w-3xl mx-auto mb-2 bg-[#161925] border border-slate-800 p-2.5 rounded-xl flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <img id="image-preview" src="" class="w-16 h-16 object-cover rounded-lg border border-slate-700">
                    <span class="text-xs text-slate-400">Tasveer attached hai. Sawaal likh kar bheinjein!</span>
                </div>
                <button onclick="removeSelectedImage()" class="text-xs bg-red-950/40 hover:bg-red-900 text-red-400 px-2.5 py-1.5 rounded-lg transition">Remove ❌</button>
            </div>

            <div class="max-w-3xl mx-auto bg-[#161925] rounded-2xl border border-slate-800/80 shadow-2xl p-2 flex flex-col space-y-2">
                <div class="flex items-center space-x-2">
                    <!-- Dynamic Camera/File Input -->
                    <label class="p-2.5 hover:bg-slate-800 rounded-xl cursor-pointer text-slate-400 hover:text-emerald-400 transition duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
                        </svg>
                        <input type="file" id="image-input" accept="image/*" class="hidden" onchange="previewImage(event)">
                    </label>

                    <textarea id="user-input" disabled rows="1" placeholder="Pehle Google Login karein..." class="flex-1 bg-transparent border-0 outline-none focus:ring-0 text-slate-200 placeholder-slate-500 resize-none py-2 text-sm disabled:opacity-50" onkeydown="handleKeyPress(event)"></textarea>
                    
                    <button id="send-btn" disabled onclick="sendMessage()" class="bg-emerald-500 hover:bg-emerald-600 disabled:bg-slate-800 disabled:text-slate-500 text-slate-950 p-2.5 rounded-xl font-bold transition duration-200">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUqwiCsDz8Wx79X7TMZkOO27Xd1AkW8Io",
            authDomain: "devibookai.firebaseapp.com",
            projectId: "devibookai",
            storageBucket: "devibookai.firebasestorage.app",
            messagingSenderId: "120848867581",
            appId: "1:120848867581:web:66bac2a7c32ac9b2fb9e94",
            measurementId: "G-84VX6Y86CF"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        const BACKEND_URL = window.location.origin; 
        let currentUser = null;
        let chatHistory = [];
        let selectedBase64Image = null; // Image storage holder

        auth.onAuthStateChanged(async (user) => {
            const loginBtn = document.getElementById('login-btn');
            const userProfile = document.getElementById('user-profile');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');

            if (user) {
                currentUser = user;
                loginBtn.classList.add('hidden');
                userProfile.classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL || 'https://via.placeholder.com/150';
                document.getElementById('user-name').innerText = user.displayName || 'Student';
                
                userInput.disabled = false;
                userInput.placeholder = "Sawaal likhein ya image upload karein...";
                sendBtn.disabled = false;

                await loadChatHistoryFromFirebase(user.uid);
            } else {
                currentUser = null;
                loginBtn.classList.remove('hidden');
                userProfile.classList.add('hidden');
                userInput.disabled = true;
                userInput.placeholder = "Pehle Google Login karein...";
                sendBtn.disabled = true;
                chatHistory = [];
                renderChat();
            }
        });

        // Preview and Convert Uploaded Image
        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                selectedBase64Image = e.target.result; // Pure base64 data URL
                document.getElementById('image-preview').src = selectedBase64Image;
                document.getElementById('image-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function removeSelectedImage() {
            selectedBase64Image = null;
            document.getElementById('image-input').value = "";
            document.getElementById('image-preview-container').classList.add('hidden');
        }

        async function googleLogin() {
            try {
                await auth.signInWithRedirect(provider);
            } catch (error) {
                alert("Auth Error: " + error.message);
            }
        }

        auth.getRedirectResult().then((result) => {
            if (result && result.user) {
                console.log("Logged in successfully!");
            }
        }).catch((err) => console.error(err));

        function googleLogout() {
            auth.signOut();
        }

        async function loadChatHistoryFromFirebase(userId) {
            try {
                const docRef = db.collection("user_chats").doc(userId);
                const doc = await docRef.get();
                if (doc.exists) {
                    chatHistory = doc.data().messages || [];
                } else {
                    chatHistory = [];
                }
                renderChat();
            } catch (error) {
                console.error(error);
            }
        }

        async function saveChatToFirebase() {
            if (!currentUser) return;
            try {
                await db.collection("user_chats").doc(currentUser.uid).set({
                    messages: chatHistory
                }, { merge: true });
            } catch (error) {
                console.error(error);
            }
        }

        function renderChat() {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = ''; 

            if (chatHistory.length === 0) {
                const welcomeContainer = document.createElement('div');
                welcomeContainer.className = "flex items-start space-x-4 max-w-2xl";
                welcomeContainer.innerHTML = `
                    <div class="bg-slate-800 p-2 rounded-lg text-emerald-400 text-sm">🤖</div>
                    <div class="bg-slate-900/60 border border-slate-800/80 p-4 rounded-2xl text-slate-300 text-sm leading-relaxed">
                        <p class="font-bold text-slate-100 mb-1">Aapka account active hai! 🎉</p>
                        Ab aap sawal likh kar bhej sakte hain ya book ki picture upload karke directly solve karwa sakte hain!
                    </div>
                `;
                chatBox.appendChild(welcomeContainer);
            } else {
                chatHistory.forEach(msg => {
                    const isUser = msg.role === 'user';
                    const container = document.createElement('div');
                    container.className = `flex items-start space-x-4 max-w-3xl ${isUser ? 'self-end flex-row-reverse space-x-reverse' : ''}`;

                    const avatar = document.createElement('div');
                    avatar.className = `p-1.5 rounded-lg text-sm ${isUser ? 'bg-emerald-500 text-slate-950 font-bold' : 'bg-slate-800 text-emerald-400'}`;
                    avatar.innerText = isUser ? '👨‍🎓' : '🤖';

                    const contentDiv = document.createElement('div');
                    contentDiv.className = `p-4 rounded-2xl text-sm leading-relaxed ${isUser ? 'bg-emerald-600 text-slate-950 font-medium' : 'bg-slate-900/40 border border-slate-800 text-slate-300'}`;
                    contentDiv.innerText = msg.content;

                    container.appendChild(avatar);
                    container.appendChild(contentDiv);
                    chatBox.appendChild(container);
                });
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message && !selectedBase64Image) return;

            // Display text in UI representing image if added
            let displayedMsg = message;
            if (selectedBase64Image && !message) {
                displayedMsg = "🖼️ Sent an Image for Analysis";
            } else if (selectedBase64Image && message) {
                displayedMsg = `🖼️ [Image Attached] ${message}`;
            }

            chatHistory.push({ role: 'user', content: displayedMsg });
            renderChat();
            input.value = '';

            const imgToSend = selectedBase64Image;
            removeSelectedImage(); // Clear selection box UI

            try {
                await saveChatToFirebase();

                const response = await fetch(`${BACKEND_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message, 
                        chatHistory: chatHistory,
                        image: imgToSend  // Sending base64 data to backend
                    })
                });
                const data = await response.json();
                
                chatHistory.push({ role: 'assistant', content: data.reply });
                renderChat();
                await saveChatToFirebase();
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        async function clearChat() {
            if (!currentUser) return;
            if (confirm("Kya aap waqai apni saari chat history delete karna chahte hain?")) {
                chatHistory = [];
                await db.collection("user_chats").doc(currentUser.uid).delete();
                renderChat();
            }
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 15;
            doc.setFontSize(16);
            doc.text("Pak Study AI - Lecture & Solutions Notes", 10, y);
            y += 15;
            doc.setFontSize(10);

            chatHistory.forEach(msg => {
                const roleText = msg.role === 'user' ? 'Student: ' : 'AI Assistant: ';
                const text = roleText + msg.content;
                const splitText = doc.splitTextToSize(text, 180);
                
                splitText.forEach(line => {
                    if (y > 280) {
                        doc.addPage();
                        y = 15;
                    }
                    doc.text(line, 10, y);
                    y += 6;
                });
                y += 4;
            });
            doc.save("Solved_Notes.pdf");
        }
    </script>
</body>
</html>
